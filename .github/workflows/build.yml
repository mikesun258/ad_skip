name: Build Android APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 手动编译开关

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle依赖
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}

      - name: Cache Android SDK
        uses: actions/cache@v3
        with:
          path: ~/Android/Sdk
          key: ${{ runner.os }}-android-sdk-34

      - name: Install Android SDK via Ali mirror
        uses: android-actions/setup-android@v3

      - name: Replace maven repo to aliyun mirror
        run: |
          sed -i 's|google()|maven { url "https://maven.aliyun.com/repository/google" }|g' build.gradle settings.gradle app/build.gradle
          sed -i 's|mavenCentral()|maven { url "https://maven.aliyun.com/repository/public" }|g' build.gradle settings.gradle app/build.gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --info

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
