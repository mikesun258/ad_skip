name: Build Android APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 关键1：完整拉取所有代码，禁用浅克隆，解决自定义方法丢失
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # 关键2：强制安装android-29平台包，补齐GestureDescription依赖的系统jar
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 29
          build-tools: 29.0.0
          extra-packages: 'platforms;android-29'

      # 关键3：gradle缓存+阿里云Maven镜像，解决Gson下载超时
      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('**/*.gradle') }}

      - name: Build APK
        run: |
          # 替换maven源为国内阿里云镜像
          echo "systemProp.maven.repo.central=https://maven.aliyun.com/repository/central" >> gradle.properties
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          path: app/build/outputs/apk/debug/app-debug.apk
