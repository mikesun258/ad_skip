name: Build Android APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Android SDK
        uses: actions/cache@v3
        with:
          path: ~/android-sdk
          key: android-sdk-platform29-buildtools34-v1

      - name: Install Android SDK via Ali mirror
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          TARGET_CMDLINE=$ANDROID_HOME/cmdline-tools/latest
          mkdir -p $TARGET_CMDLINE ~/.android
          if [ ! -f "$TARGET_CMDLINE/bin/sdkmanager" ]; then
            wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip commandlinetools-linux-11076708_latest.zip -d tmp-tools
            mv tmp-tools/cmdline-tools/* $TARGET_CMDLINE/
            rm -rf tmp-tools
          fi
          SDK_BIN=$TARGET_CMDLINE/bin
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo 'sdk.manager.site=https://dl.aliyuncs.com/android/android/repository/' >> ~/.android/sdkmanager.conf
          yes | $SDK_BIN/sdkmanager --licenses
          $SDK_BIN/sdkmanager "platforms;android-29" "build-tools;34.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          # mavenCentral第三方库阿里云镜像
          echo "systemProp.maven.repo.central=https://maven.aliyun.com/repository/central" >> gradle.properties
          # 生成CI专用初始化脚本，同时替换buildscript和allprojects仓库
          cat > ci-init.gradle << 'EOF'
          buildscript {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  mavenCentral()
              }
          }
          allprojects {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  mavenCentral()
              }
          }
          EOF
          # Gradle原生初始化脚本环境变量，全生命周期加载，不会传入JVM
          export GRADLE_INIT_SCRIPT=$PWD/ci-init.gradle
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkipAd-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
