name: Build Android APK
# 触发条件：main分支推送、PR、手动可触发
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 支持网页手动运行打包

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 拉取完整源码
      - name: Checkout source code
        uses: actions/checkout@v4

      # 配置JDK11，适配新版Gradle
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle # 缓存gradle依赖，加速后续打包

      # 赋予gradlew执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 编译Debug测试包
      - name: Build debug APK
        run: ./gradlew assembleDebug

      # 把编译好的APK上传到Action制品，可下载
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkipAd-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30 # 打包文件保留30天
