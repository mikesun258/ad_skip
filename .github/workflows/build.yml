name: Build Android APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Android SDK
        uses: actions/cache@v3
        with:
          path: ~/android-sdk
          key: android-sdk-platform29-buildtools34-v1

      - name: Install Android SDK via Ali mirror
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools/latest ~/.android
          if [ ! -d "$ANDROID_HOME/cmdline-tools/latest/bin" ]; then
            wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip commandlinetools-linux-11076708_latest.zip -d tmp-tools
            mv tmp-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
            rm -rf tmp-tools
          fi
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          echo 'sdk.manager.site=https://dl.aliyuncs.com/android/android/repository/' >> ~/.android/sdkmanager.conf
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-29" "build-tools;34.0.0"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          echo "systemProp.maven.repo.central=https://maven.aliyun.com/repository/central" >> gradle.properties
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkipAd-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
