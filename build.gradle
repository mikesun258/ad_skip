buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // 改成7.2.3，适配gradle7.5
        classpath 'com.android.tools.build:gradle:7.2.3'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
