buildscript {
    repositories {
        // 替换google()为固定完整地址
        maven { url "https://dl.google.com/android/maven2" }
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:7.2.3'
    }
}
allprojects {
    repositories {
        // 同上替换
        maven { url "https://dl.google.com/android/maven2" }
        mavenCentral()
    }
}
