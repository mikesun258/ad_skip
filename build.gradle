buildscript {
    repositories {
        // 替换为中科大Android镜像
        maven { url "https://mirrors.ustc.edu.cn/android/repository/google" }
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:7.2.3'
    }
}
allprojects {
    repositories {
        maven { url "https://mirrors.ustc.edu.cn/android/repository/google" }
        mavenCentral()
    }
}
