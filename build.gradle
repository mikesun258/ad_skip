buildscript {
    repositories {
        // 正确中科大Android maven仓库完整地址
        maven { url "https://mirrors.ustc.edu.cn/android/maven2" }
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:7.2.3'
    }
}
allprojects {
    repositories {
        maven { url "https://mirrors.ustc.edu.cn/android/maven2" }
        mavenCentral()
    }
}
